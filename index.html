/* รูปร้าน */
.profile{
  width:120px;
  height:120px;
  border-radius:50%;

}

/* ปุ่มแบบ iPhone */
.btn{
  display:block;
  width:85%;
  margin:12px auto;
  padding:16px;
  border-radius:20px;
  background:rgba(255,255,255,0.9);
  text-decoration:none;
  color:#ff4fa3;
  font-size:18px;
  font-weight:bold;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  transition:0.25s;
}

.btn:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- ใส่รูปร้านตรงนี้ -->
