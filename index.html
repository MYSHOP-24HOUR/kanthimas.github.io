<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ร้านของฉัน</title>

<style>

/* ===== พื้นหลัง ===== */
body{
  margin:0;
  background:#ffd6ec;
  font-family:-apple-system,BlinkMacSystemFont,
  "Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  text-align:center;
}

/* ===== กล่องหลัก ===== */
.container{
  max-width:400px;
  margin:auto;
  padding:30px 20px;
}

/* ===== โลโก้ร้าน ===== */
.logo{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

/* ===== ชื่อร้าน ===== */
h1{
  color:#ff4fa3;
  margin-bottom:25px;
}

/* ===== ปุ่มสไตล์ iPhone ===== */
.button{
  display:block;
  margin:14px 0;
  padding:16px;
  border-radius:22px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
  text-decoration:none;
  color:#ff4fa3;
  font-weight:600;
  box-shadow:
    0 4px 10px rgba(0,0,0,0.1),
    inset 0 1px 1px rgba(255,255,255,0.6);
  transition:0.25s;
}

.button:hover{
  transform:translateY(-2px);
}

.button:active{
  transform:scale(0.95);
}

/* hover */
.button:hover{
  transform:scale(1.03);
}

/* ตอนกด (เหมือน iOS) */
.button:active{
  transform:scale(0.96);
}

</style>
</head>

<body>

<div class="container">

<!-- ⭐ ใส่ลิงก์รูปโลโก้ตรงนี้ -->
<img class="logo"
src="IMG_1964.jpeg">

<h1>Candy Shop</h1>

<!-- ⭐ เปลี่ยนลิงก์หลัง href ได้เลย -->

<a class="button" href="product1.html">
🛍 สินค้าอย่างที่ 1
</a>
<a class="button" href="product2.html">
🎀 สินค้าอย่างที่ 2
</a>

<a class="button" href="https://www.instagram.com/vxzue.m">
📸 Instagram
</a>

<a class="button" href="https://www.facebook.com/share/189hpW8MGC">
👍 Facebook
</a>

<a class="button" href="ใส่ลิงก์ไลน์">
💬 LINE
</a>

</div>

</body>
</html>
