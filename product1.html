<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สินค้า</title>

<!-- ✅ โหลดฟ้อน Mali + Kanit -->
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#ffd6ec;

  /* ✅ เนื้อหาใช้ Kanit */
  font-family:'Kanit', sans-serif;
  text-align:center;
}

.container{
  max-width:400px;
  margin:auto;
  padding:30px 20px;
}

/* ✅ หัวข้อใช้ Mali */
h1{
  color:#ff4fa3;
  font-family:'Mali', cursive;
}

h3{
  font-family:'Mali', cursive;
  color:#ff6bb5;
}

/* ===== กล่องสินค้า ===== */
.product-card{
  background:white;
  border-radius:20px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.product-img{
  width:100%;
  border-radius:15px;
}

.desc{
  margin-top:10px;
  color:#444;
  font-weight:400;
}

/* ===== ปุ่ม ===== */
.button{
  display:block;
  margin-top:25px;
  padding:16px;
  border-radius:20px;
  background:white;
  text-decoration:none;
  color:#ff4fa3;
  font-weight:500;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);

  /* ปุ่มอ่านง่ายใช้ Kanit */
  font-family:'Kanit', sans-serif;
}

.button:active{
  transform:scale(0.95);
}

</style>
</head>

<body>

<div class="container">

<h1>เติมเกม</h1>

<!-- ===== สินค้า 1 ===== -->
<div class="product-card">
  <img class="product-img" src="663BD7F6-F626-4873-BCE0-819856CFC4B8.jpeg?v=2">
  <h3>สินค้า 1</h3>
  <p class="desc">ราคา 199฿ / รายละเอียดสินค้า</p>
</div>

<!-- ===== สินค้า 2 ===== -->
<div class="product-card">
  <img class="product-img" src="663BD7F6-F626-4873-BCE0-819856CFC4B8.jpeg?v=2">
  <h3>สินค้า 2</h3>
  <p class="desc">ราคา 259฿ / รายละเอียดสินค้า</p>
</div>

<!-- ===== สินค้า 3 ===== -->
<div class="product-card">
  <img class="product-img" src="663BD7F6-F626-4873-BCE0-819856CFC4B8.jpeg?v=2">
  <h3>สินค้า 3</h3>
  <p class="desc">ราคา 299฿ / รายละเอียดสินค้า</p>
</div>

<a class="button" href="index.html">⬅ กลับหน้าหลัก</a>

</div>

</body>
</html>
